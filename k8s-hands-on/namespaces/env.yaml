apiVersion: v1
kind: Namespace
metadata:
  name:  dev
  labels:
    name: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name:  pro
  labels:
    name: pro
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: 
    # Anotacion para definir una causa de cambio en el deployment
    kubernetes.io/change-cause: Changes port to 120
  name: deployment-test
  namespace: dev
  labels:
    app: front
# Hasta aqui lo que es el deployment
# Desde aqui el replicaset
spec:
  # cuantos replicaSet queremos guardar en un futro
  #revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: front
# Desde aqui el pod que se creará
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
          - containerPort: 120
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: 
    # Anotacion para definir una causa de cambio en el deployment
    kubernetes.io/change-cause: Changes port to 120
  name: deployment-pro
  namespace: pro
  labels:
    app: back
# Hasta aqui lo que es el deployment
# Desde aqui el replicaset
spec:
  # cuantos replicaSet queremos guardar en un futro
  #revisionHistoryLimit: 1
  replicas: 5
  selector:
    matchLabels:
      app: back
# Desde aqui el pod que se creará
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
          - containerPort: 120