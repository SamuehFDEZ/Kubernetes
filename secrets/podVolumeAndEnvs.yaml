apiVersion: v1
kind: Secret
metadata:
  name: secret1
type: Opaque
stringData:
  username: "usertest"
  password: "passwordtest"
---
apiVersion: v1
kind: Pod
metadata:
  name: mypod
spec:
  containers:
    - name: mypod
      image: nginx:alpine
      volumeMounts:
        - name: test
          readOnly: true
          mountPath: "/opt"
      env:
        - name: USERTEST
          valueFrom:
            secretKeyRef:
              name: secret1
              key: username
        - name: PASSWORDTEST
          valueFrom:
            secretKeyRef:
              name: secret1
              key: password
  volumes:
    - name: test
      secret:
        secretName: secret1
        items:
          - key: username
            path: user.txt